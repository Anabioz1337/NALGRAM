name: Build NALGRAM iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Prepare build configuration
        shell: bash
        run: |
          mkdir -p build-input/github-secrets
          cat > build-input/github-secrets/configuration.json <<'EOF'
          ${{ secrets.NALGRAM_CONFIGURATION_JSON }}
          EOF

      - name: Decode signing bundle
        shell: bash
        run: |
          mkdir -p build-input/github-secrets/codesigning
          printf '%s' '${{ secrets.NALGRAM_CODESIGNING_ZIP_B64 }}' > build-input/github-secrets/codesigning.zip.b64
          python3 - <<'PY'
          import base64
          from pathlib import Path

          encoded = Path("build-input/github-secrets/codesigning.zip.b64").read_text()
          decoded = base64.b64decode(encoded)
          Path("build-input/github-secrets/codesigning.zip").write_bytes(decoded)
          PY
          unzip -q build-input/github-secrets/codesigning.zip -d build-input/github-secrets/codesigning

      - name: Build NALGRAM IPA
        shell: bash
        env:
          P12_PASSWORD: ${{ secrets.NALGRAM_P12_PASSWORD }}
        run: |
          mkdir -p build/artifacts
          python3 build-system/Make/Make.py \
            --cacheDir="$HOME/telegram-bazel-cache" \
            --overrideXcodeVersion \
            build \
            --configuration release_arm64 \
            --buildNumber "${{ github.run_number }}" \
            --configurationPath build-input/github-secrets/configuration.json \
            --codesigningInformationPath build-input/github-secrets/codesigning \
            --outputBuildArtifactsPath build/artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nalgram-ios-build
          path: |
            build/artifacts/NALGRAM.ipa
            build/artifacts/NALGRAM.DSYMs.zip
          if-no-files-found: error
